<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            background-color: rgb(255, 255, 255);
        }

        #table1 {

            width: 260px;
            border: 0px solid;


            text-align: center;
            background-color: rgb(97, 97, 97);
            padding: 5px;
            border-radius: 20px;
            box-shadow: 5px 5px 9px rgba(0, 0, 0, 0.6);

        }

        button {
            text-align: center;
            background-color: rgb(97, 97, 97);
            border-radius: 100%;
            padding: 18px;
            padding-left: 21px;
            padding-right: 21px;
            color: aliceblue;
            margin: 5px;
            border: none;
            font-size: 15px;
            box-shadow: 2px 2px 6px rgba(0, 0, 0, .6);


        }

        td {
            background-color: rgb(97, 97, 97);
            border: 0px solid rgb(97, 97, 97);
        }

        th {
            background-color: rgb(97, 97, 97);
            border: 0px solid rgb(97, 97, 97);


        }

        button:hover {
            background-color: rgb(88, 88, 88);
            color: aliceblue;
            transition: .3s;
        }

        #screen {

            margin: 1%;
            border-radius: 20px;
            width: 90%;
            text-align: right;
            font-size: 300%;
            background-color: whitesmoke;
            color: black;
        }

        #ans {
            padding-left: 14px;
            padding-right: 14px;
            background-color: rgb(255, 144, 17);
        }

        #ans:hover {
            background-color: rgb(225, 126, 12);
            color: rgb(220, 229, 236);
        }

        #clear {
            padding-left: 16px;
            padding-right: 16px;
            color: rgb(241, 129, 1);
        }

        .symb {
            padding-left: 19px;
            padding-right: 19px;
            padding-top: 13px;
            padding-bottom: 13px;
            font-size: 25px;
        }
    </style>
</head>

<body>
    <div>

        <p></p>


        <table id="table1" border="0">

            <th colspan="4"><input type="text" id="screen"></th>
            <tr>
                <td><button id="btn1" value="1" onclick="wr('btn1')">1</button></td>
                <td><button id="btn2" value="2" onclick="wr('btn2')">2</button></td>
                <td><button id="btn3" value="3" onclick="wr('btn3')">3</button></td>
                <td><button id="btn+" class="symb" value="+" onclick="wr('btn+')"
                        style="color: rgb(241, 129, 1);">+</button></td>

            </tr>
            <tr>
                <td><button id="btn4" value="4" onclick="wr('btn4')">4</button></td>
                <td><button id="btn5" value="5" onclick="wr('btn5')">5</button></td>
                <td><button id="btn6" value="6" onclick="wr('btn6')">6</button></td>
                <td><button id="btn-" class="symb" value="-" onclick="wr('btn-')"
                        style="color: rgb(241, 129, 1); padding-left: 20px; padding-right: 20px;">−</button></td>

            </tr>
            <tr>
                <td><button id="btn7" value="7" onclick="wr('btn7')">7</button></td>
                <td><button id="btn8" value="8" onclick="wr('btn8')">8</button></td>
                <td><button id="btn9" value="9" onclick="wr('btn9')">9</button></td>
                <td><button id="btn*" class="symb" value="*" onclick="wr('btn*')"
                        style="color: rgb(241, 129, 1);">×</button></td>

            </tr>
            <tr>
                <td><button id="btn/" class="symb" value="/" onclick="wr('btn/')"
                        style="color: rgb(241, 129, 1); padding-left: 23px; padding-right: 23px;">/</button></td>
                <td><button id="btn0" value="0" onclick="wr('btn0')">0</button></td>
                <td><button id="ans" onclick="ans(), sound()">ans</button></td>
                <td><button id="clear" onclick="clear_screen()">AC</button></td>
            </tr>


        </table>


        <script>

            function wr(b) {
                if (document.getElementById("screen").value == 0) {
                    document.getElementById("screen").value = ""
                }
                document.getElementById("screen").value += document.getElementById(b).value;
            }


            function ans() {

                var b = document.getElementById("screen").value;
                var ans = eval(b);
                document.getElementById("screen").value = ans;

            }
            function clear_screen() {
                document.getElementById("screen").value = 0;

              
            }
            function sound() {
                    var snd = new Audio("clicksound.mp3")//wav is also supported
                    snd.play()//plays the sound
                }
        </script>

    </div>


</body>

</html>
