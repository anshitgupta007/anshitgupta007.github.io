<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        
        #table1{
            
            width: 20%;
            border: 2px solid ;
            
        
            text-align: center;
            margin-top: 15%;
            margin-left: 37.5%;
            background-color:aquamarine;       
            border-radius: 30px;      
            padding-bottom: 1%;
          }
        button{
            text-align: center;
            margin-top: 5%;
            margin-bottom: 5%;
            border-radius: 5px;  
            padding: 30%;
        
            
            
        }
        button:hover{
            background-color:whitesmoke;
        }
        #screen{
        
            margin-top: 5%;
            border-radius: 10px;
            width: 90%;
            text-align: right;
            font-size: 300%;
            background-color:whitesmoke;
            color:black        }  
       
    </style>
</head>
<body>
    <div>
        
        <p></p>
        

        <table id="table1">

            <th colspan="4"><input type="text" id="screen"></th>
            <tr>
                <td><button id="btn1" value="1" onclick="wr('btn1')">1</button></td>
                <td><button id="btn2" value="2" onclick="wr('btn2')">2</button></td>
                <td><button id="btn3" value="3" onclick="wr('btn3')">3</button></td>
                <td><button id="btn+" onclick="add()">+</button></td>

            </tr>
            <tr>
                <td><button id="btn4" value="4" onclick="wr('btn4')">4</button></td>
                <td><button id="btn5" value="5" onclick="wr('btn5')">5</button></td>
                <td><button id="btn6" value="6" onclick="wr('btn6')">6</button></td>
                <td><button id="btn-" onclick="substract()">-</button></td>

            </tr>
            <tr>
                <td><button id="btn7" value="7" onclick="wr('btn7')">7</button></td>
                <td><button id="btn8" value="8" onclick="wr('btn8')">8</button></td>
                <td><button id="btn9" value="9" onclick="wr('btn9')">9</button></td>
                <td><button id="btn*" onclick="multiply()">*</button></td>

            </tr>
            <tr><td colspan="2"><button id="ans"  onclick="ans()">ans</button></td>
                <td><button id="btn/" onclick="divide()">/</button></td>
                <td><button id="btn0" value="0" onclick="wr('btn0')">0</button></td>
            </tr>
            

        </table>
        

        <script>
            var a=0;
            var s="";
            var c=0;
            function wr(b){
                if(c==1) {
                    document.getElementById("screen").value="";
                    c=0;
                    



                }
                document.getElementById("screen").value+=document.getElementById(b).value;

            
            }
            
            
            function add(){
                
                a=document.getElementById("screen").value;
                document.getElementById("screen").value="";


                a=parseInt(a);
                document.getElementById("screen").value="+";
                s="+"
                c=1

            }

            function substract(){
                a=document.getElementById("screen").value;
                document.getElementById("screen").value="";


                a=parseInt(a);
                document.getElementById("screen").value="-";
                s="-"
                c=1
            }
            function multiply(){
                a=document.getElementById("screen").value;
                document.getElementById("screen").value="";


                a=parseInt(a);
                document.getElementById("screen").value="*";
                s="*"
                c=1
            }
            function divide(){
                a=document.getElementById("screen").value;
                document.getElementById("screen").value="";


                a=parseInt(a);
                document.getElementById("screen").value="/";
                s="/"
                c=1
            }
            function ans(){
                
                var b=document.getElementById("screen").value;
                b=parseInt(b);
                if(s=='+'){
                    document.getElementById("screen").value=a+b;
                    s=""
                }
                else if(s=="-"){
                    document.getElementById("screen").value=a-b;
                    
                    s=""
                }
                else if(s=="*"){
                    document.getElementById("screen").value=a*b;
                    
                    s=""
                }
                else if(s=="/"){
                    document.getElementById("screen").value=a/b;
                    
                    s=""
                }

            }
        </script>
    
    </div>

   
</body>
</html>
