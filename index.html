<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        
        #table1{
            
            width: 20%;
            border: 2px solid ;
            
        
            text-align: center;
            margin-top: 15%;
            margin-left: 37.5%;
            background-color:aquamarine;       
            border-radius: 30px;      
            padding-bottom: 1%;
          }
        button{
            text-align: center;
            
            border-radius: 5px;  
            padding: 18px;
        
            
            
        }
        button:hover{
            background-color:whitesmoke;
        }
        #screen{
        
            margin-top: 5%;
            border-radius: 10px;
            width: 90%;
            text-align: right;
            font-size: 300%;
            background-color:whitesmoke;
            color:black        }  
       
    </style>
</head>
<body>
    <div>
        
        <p></p>
        

        <table id="table1">

            <th colspan="4"><input type="text" id="screen"></th>
            <tr>
                <td><button id="btn1" value="1" onclick="wr('btn1')">1</button></td>
                <td><button id="btn2" value="2" onclick="wr('btn2')">2</button></td>
                <td><button id="btn3" value="3" onclick="wr('btn3')">3</button></td>
                <td><button id="btn+" value="+" onclick="wr('btn+')">+</button></td>

            </tr>
            <tr>
                <td><button id="btn4" value="4" onclick="wr('btn4')">4</button></td>
                <td><button id="btn5" value="5" onclick="wr('btn5')">5</button></td>
                <td><button id="btn6" value="6" onclick="wr('btn6')">6</button></td>
                <td><button id="btn-" value="-"  onclick="wr('btn-')">-</button></td>

            </tr>
            <tr>
                <td><button id="btn7" value="7" onclick="wr('btn7')">7</button></td>
                <td><button id="btn8" value="8" onclick="wr('btn8')">8</button></td>
                <td><button id="btn9" value="9" onclick="wr('btn9')">9</button></td>
                <td><button id="btn*" value="*" onclick="wr('btn*')">*</button></td>

            </tr>
            <tr>
                <td><button id="btn/" value="/" onclick="wr('btn/')">/</button></td>
                <td><button id="btn0" value="0" onclick="wr('btn0')">0</button></td>
                <td><button id="ans"  onclick="ans()">ans</button></td>
                <td><button id="clear"  onclick="clear_screen()">AC</button></td>
            </tr>
            

        </table>
        

        <script>
            
            function wr(b){
                if (document.getElementById("screen").value==0){
                    document.getElementById("screen").value=""
                }
                
                document.getElementById("screen").value+=document.getElementById(b).value;

            
            }
            
            
            function ans(){
                
                var b=document.getElementById("screen").value;
                var ans=eval(b);
                document.getElementById("screen").value=ans;

            }
            function clear_screen(){
                document.getElementById("screen").value=0;
            }
        </script>
    
    </div>

   
</body>
</html>
